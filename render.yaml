services:
  - type: web
    name: rory-ts-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Le seguenti variabili vanno inserite manualmente nel dashboard Render:
      # DATABASE_URL, JWT_SECRET, REFRESH_TOKEN_SECRET, ENCRYPTION_KEY,
      # SESSION_SECRET, CORS_ORIGIN, TELEGRAM_BOT_TOKEN
